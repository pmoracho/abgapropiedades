# netlify.toml — configuración de deploy

[build]
  command = "npm run build:search"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# Redirecciones para URLs limpias (sin .html)
[[redirects]]
  from = "/propiedades"
  to = "/propiedades/"
  status = 301

# Headers de seguridad y caché
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
