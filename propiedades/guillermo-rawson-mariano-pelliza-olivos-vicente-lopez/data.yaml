  BAJA: AMPLIO LIVING con CHIMENEA y COMEDOR y ESCRITORIO, TOILETTE SUITE AMPLIA con
  VESTIDOR, baño compartimentado a grandes ventanales Vista a jardines. DOS DORMITORIOS
  con Baño compartido. LIVING INTIMO con Vistas todo lleno de luz y sol. PLANTA ALTA:
  DOS DORMITORIOS, Baño Compartido y ESCRITORIO TERRAZA AMPLIA rodeada de árboles
  SUBSUELO: PLAYROOM Amplio con Chimenea SERVICIO 2 Dormitorios y baño completo CALEFACCIÓN
  y AGUA CALIENTE Central. GARAGE para 4 coches y espacio externo para 4 coches, TALLER.
  QUINCHO para 16 personas con Parrilla y Horno de barro. y PILETA CLIMATIZADA . VESTUARIOS
  con Ducha y sanitarios. JARDINES con Arboles de variadas especies que abrazan la
  casa, le dan una calidez y encanto magnético, con trinos de pájaros, se disfruta
  la quietud, la luz, el SOL ESTANQUE: Variedad de Peces y colores. INSTALACIONES:
  SEGURIDAD Perimetral. PORTONES Automáticos. CÁMARAS de Seguridad. TELEFONÍA Interna
  . RED de Datos. ILUMINACIÓN Led Automatizada. BAJO costo de mantenimiento. ZONA
