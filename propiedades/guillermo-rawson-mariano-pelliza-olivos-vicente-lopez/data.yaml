descripcion: 'MAGNÍFICA CASA rodeada de Parques Arboles y vegetación exótica. 1516m.
  CALIDEZ y CONFORT en 3 Plantas construcción MID CENTURY MODERN STYLE en 740M2 PLANTA
  BAJA: AMPLIO LIVING con CHIMENEA y COMEDOR y ESCRITORIO, TOILETTE SUITE AMPLIA con
  VESTIDOR, baño compartimentado a grandes ventanales Vista a jardines. DOS DORMITORIOS
  con Baño compartido. LIVING INTIMO con Vistas todo lleno de luz y sol. PLANTA ALTA:
  DOS DORMITORIOS, Baño Compartido y ESCRITORIO TERRAZA AMPLIA rodeada de árboles
  SUBSUELO: PLAYROOM Amplio con Chimenea SERVICIO 2 Dormitorios y baño completo CALEFACCIÓN
  y AGUA CALIENTE Central. GARAGE para 4 coches y espacio externo para 4 coches, TALLER.
  QUINCHO para 16 personas con Parrilla y Horno de barro. y PILETA CLIMATIZADA . VESTUARIOS
  con Ducha y sanitarios. JARDINES con Arboles de variadas especies que abrazan la
  casa, le dan una calidez y encanto magnético, con trinos de pájaros, se disfruta
  la quietud, la luz, el SOL ESTANQUE: Variedad de Peces y colores. INSTALACIONES:
  SEGURIDAD Perimetral. PORTONES Automáticos. CÁMARAS de Seguridad. TELEFONÍA Interna
  . RED de Datos. ILUMINACIÓN Led Automatizada. BAJO costo de mantenimiento. ZONA
  RESIDENCIAL, de calles arboladas y Seguridad. Cerca del Colegio San Andres y Torguet.'
descripcion_en: 'MAGNIFICENT HOUSE surrounded by Gardens, Trees and exotic vegetation.
  1516m2 lot. WARMTH and COMFORT across 3 levels, MID CENTURY MODERN STYLE
  construction on 740m2. GROUND FLOOR: SPACIOUS LIVING ROOM with FIREPLACE,
  DINING ROOM and STUDY, EN-SUITE TOILETTE with WALK-IN CLOSET, partitioned
  bathroom with large windows overlooking the gardens. TWO BEDROOMS sharing
  a bathroom. INTIMATE LIVING ROOM with views, full of light and sun. UPPER
  FLOOR: TWO BEDROOMS, shared bathroom and STUDY, SPACIOUS TERRACE surrounded
  by trees. BASEMENT: Spacious PLAYROOM with fireplace, STAFF QUARTERS with
  2 bedrooms and a full bathroom. Central HEATING and HOT WATER. GARAGE for
  4 cars plus outdoor space for 4 more cars, WORKSHOP. QUINCHO (covered
  entertaining area) for 16 people with grill and wood-fired oven, and
  HEATED POOL. CHANGING ROOMS with shower and restrooms. GARDENS with trees
  of varied species embracing the house, giving it warmth and magnetic
  charm, with birdsong, enjoying the quiet, the light, the SUN. POND: a
  variety of fish and colors. FACILITIES: Perimeter SECURITY. Automatic
  GATES. Security CAMERAS. Internal TELEPHONE system. Data NETWORK.
  Automated LED LIGHTING. LOW maintenance cost. RESIDENTIAL AREA, with
  tree-lined streets and security. Close to San Andrés and Torcuato di
  Tella schools.'  
