descripcion: 'Excelente torre, Pallier Semiprivado Amplia RECEPCIÓN a BALCON, 2 DORMITORIOS, 2 BAÑOS, 
    AMPLIA COCINA y LAVADERO a NUEVO, EDIFICIO rodeado de Jardines, con dos Ascensores Principales y 
    Dos de Servicio, COCHERA FIJA entrada por rampa, VIGILANCIA  24hs. en excelente ubicación cerca 
    del Parque Thays, de Avenidas importantes como Del Libertador, Av. Alvear, 9 de Julio, centros 
    de compra de primera línea con Bares y Restó en el entorno, con salas de cine y teatro. En 
    impecable estado refaccionado  y recién pintado.'  
descripcion_en: 'Excellent apartment, semi-private landing, spacious living room opening onto a balcony, 
    2 bedrooms, 2 bathrooms, spacious kitchen and brand-new laundry room, building surrounded by gardens, 
    with two main elevators and two service elevators, dedicated parking space with ramp access, 
    24-hour security. In an excellent location near Thays Park, major avenues such as Del Libertador, 
    Av. Alvear, and 9 de Julio, top-tier shopping centers with bars  and restaurants in the vicinity, 
    as well as movie theaters and a theater. In impeccable condition—renovated and freshly painted.'
