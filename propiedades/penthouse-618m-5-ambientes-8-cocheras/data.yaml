descripcion: 'PENTHOUSE UNICO, ALTÍSIMO VISTA PANORÁMICA A CIUDAD Y RIO, RECEPCIÓN
  128m piso Mármol de Carrara se extiende a BALCÓN TERRAZA con vista a Río y Ciudad,
  AMPLIO COMEDOR, ESCRITORIO DOBLE separado por puertas corredizas con Bibliotecas
  empotradas de cedro, 4 SUITE la Principal con 2 VESTIDORES y 2 BAÑOS con Mármoles
  y Vista. 3 Dependencias, Amplia COCINA con Isla, Gran Office, 2 Bauleras, 4 COCHERAS
  FIJAS Dobles, todo el piso en materiales de máxima calidad en impecable estado,
  Pisos de Roble. EDIFICIO EN TORRE con entrada estilo Imperial, con Ascensores codificados,
  SEGURIDAD en todas las áreas las 24hs. La UBICACIÓN privilegiada sobre AV. ALVEAR
  la más Distinguida y Tradicional de Buenos Aires, a pasos de Plaza Carlos Pellegrini,
  Jockey Club, Plaza de Cataluña, próximo a Paque Thays, Plaza Francia, Hoteles de
  Primera Línea, Shopping, Teatros, Cines, Bares y Restos. SKU: AP-680 Categoría:
  Venta'
descripcion_en: 'UNIQUE PENTHOUSE, STUNNING PANORAMIC VIEWS OF THE CITY AND RIVER, ENTRANCE HALL
  128m Carrara marble floor extending to a BALCONY-TERRACE with views of the river and city,
  SPACIOUS DINING ROOM, DOUBLE OFFICE separated by sliding doors with
  built-in cedar bookcases, 4 SUITES—the Master Suite featuring 2 WALK-IN CLOSETS and 2 BATHROOMS with marble
  and a view. 3 Servant’s quarters, Spacious KITCHEN with an island, Large pantry, 2 storage rooms, 4
  FIXED double parking spaces, the entire floor finished with top-quality materials in impeccable condition,
  oak floors. TOWER BUILDING with an Imperial-style entrance, code-access elevators,
  24-hour security in all areas. Prime LOCATION on Av. Alvear,
  the most distinguished and traditional avenue in Buenos Aires, just steps from Plaza Carlos Pellegrini,
  the Jockey Club, and Plaza de Cataluña, near Parque Thays, Plaza Francia, top-tier
  hotels, shopping centers, theaters, movie theaters, bars, and restaurants. SKU: AP-680 Category:
  For Sale'
