nombre: "ABGA Propiedades"

# Tagline bilingüe — se muestra en el hero y el footer
tagline:
  es: "Tenemos un lugar para vos."
  en: "We have a place for you."

descripcion:
  es: "ABGA Propiedades funciona en plaza desde 1984, ubicada en la zona más exclusiva de CABA, es considerada BOUTIQUE INMOBILIARIA con cálida atención personal, y jerarquizada, con asesoramiento comercial y legal. Tasación y valuación profesional a cargo de BERTA GARZÓN, Martillera y Corredora Inmobiliaria matrícula Nro. 1497"
  en: "ABGA Propiedades has been operating since 1984, located in the most exclusive area of Buenos Aires. It is recognized as a BOUTIQUE REAL ESTATE AGENCY offering warm, personalized, high-level service with commercial and legal advisory. Professional appraisals by BERTA GARZÓN, licensed Real Estate Broker, registration No. 1497."

# Logo e ícono de página
# Rutas relativas a la raíz del sitio (_site/)
