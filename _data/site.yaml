  logo_footer: /img/logo_footer.png  # ej: /img/logo.svg  — reemplazar cuando tengas el archivo
  logo_ancho: 160             # px — ancho máximo del logo en el header
  favicon: /img/favicon.svg   # ej: /img/favicon.ico o /img/favicon.png
  favicon_svg: null           # ej: /img/favicon.svg — navegadores modernos prefieren SVG
  apple_touch_icon: null      # ej: /img/apple-touch-icon.png (180x180px)
  og_image: null              # ej: /img/og-default.jpg (1200x630px)

